title: Vysvetlivka
name: tooltip
params:
  - name: id
    type: string
    required: true
    description: Unikátne ID pre prepojenie triggeru a obsahu (aria-describedby).
  - name: label
    type: string
    required: false
    description: Text vedľa ikonky (napr. názov poľa). Ak chýba, zobrazí sa len ikonka.
  - name: content
    type: string
    required: true
    description: Text vnútri bubliny (max 290 znakov).
  - name: position
    type: string
    required: false
    description: Preferovaná pozícia (top, bottom, left, right). Základné je 'right'.
  - name: classes
    type: string
    required: false
    description: Dodatočné CSS triedy.
  - name: attributes
    type: object
    required: false
    description: HTML atribúty pre kontajner.
  - name: triggerClasses
    type: string
    required: false
    description: Triedy, ktoré sa pridajú priamo na trigger

examples:
  - name: default
    options:
      id: 'tooltip-default'
      label: 'Základné nastavenie tooltipu'
      content: 'Toto je príklad použitia tooltipu v základnom stave. Text by mal mať dĺžku max. 290 znakov.'
  - name: (zameranie klávesnicou)
    options:
      id: 'tooltip-focus'
      label: 'Zameranie klávesnicou'
      content: 'Po zameraní focusom sa objaví oranžový obrys. Text by mal mať dĺžku max. 290 znakov.'
      triggerClasses: 'govuk-tooltip__trigger--focused'
      contentClasses: 'govuk-tooltip__content--visible'
  - name: (iba ikonka)
    options:
      id: 'tooltip-icon'
      content: 'Toto je len informačná ikonka bez labelu. Text by mal mať dĺžku max. 290 znakov.'
  - name: (horná vysvetlivka)
    options:
      id: 'tooltip-top'
      label: 'Pozícia hore'
      position: 'top'
      classes: 'govuk-!-margin-top-5'
      content: 'Vysvetlivka sa zobrazí nad ikonou.'
  - name: (dolná vysvetlivka)
    options:
      id: 'tooltip-bottom'
      label: 'Pozícia dole'
      position: 'bottom'
      content: 'Vysvetlivka sa zobrazí pod ikonou. Text by mal mať dĺžku max. 290 znakov.'
